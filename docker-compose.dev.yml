services:
  turbo:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: turbo-dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - TURBO_TELEMETRY_DISABLED=1
      # Explicitly override connection strings to use internal docker hostnames
      # This allows connection strings in .env to be set to "localhost" for local dev
      - POSTGRES_URL=postgres://dev:dev@db:5432/cd-judge
      - REDIS_URL=redis://redis:6379
    command: pnpm dev
    depends_on:
      - db
      - redis
    networks:
      - cd-judge-network

  worker:
    build:
      context: .
      dockerfile: packages/jobs/Dockerfile
    container_name: cd-judge-worker
    restart: unless-stopped
    # isolate needs cgroup access for sandboxing
    privileged: true
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
      - WORKER_CONCURRENCY=10
    volumes:
      # Mount source for live changes in dev (read-only)
      - ./packages/jobs/src:/app/packages/jobs/src:ro
    networks:
      - cd-judge-network

# Inherited from base, no need to redefine unless overriding
# volumes: ...
